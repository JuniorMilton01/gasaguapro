<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GasAgua Pro - Sistema de Gestão</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icone-192.png">
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" href="index-BCooEiNa.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
  </head>
  <body>
    <div id="root">
      <div style="padding: 20px; text-align: center;">
        <h1>GasAgua Pro</h1>
        <p>Sistema carregando...</p>
        <p>Se esta mensagem persistir, o arquivo JavaScript principal não foi encontrado.</p>
      </div>
    </div>
    <script src="conexao.js"></script>
    <script src="storage.js"></script>
    <script>
      // Teste rápido - app inline
      console.log("Sistema iniciado manualmente");
      document.getElementById('root').innerHTML = 
        '<div style="padding: 20px;">' +
        '<h1>✅ GasAgua Pro Funcionando!</h1>' +
        '<p>Auto-save ativo: ' + (typeof window.ativarAutoSave !== 'undefined' ? 'SIM' : 'NÃO') + '</p>' +
        '<p>Firebase: ' + (typeof window.salvarNaNuvem !== 'undefined' ? 'Conectado' : 'Desconectado') + '</p>' +
        '<button onclick="window.salvarAgora && window.salvarAgora()">Testar Salvar</button>' +
        '</div>';
    </script>
  </body>
</html>
